<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あかちゃんあそびば 🎉</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a1a;
  overflow:hidden;
  width:100vw; height:100vh;
  font-family:'M PLUS Rounded 1c','Kosugi Maru',sans-serif;
  cursor:none;
  user-select:none;
}

/* ===== 待機画面 ===== */
#waitScreen {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:800; gap:20px;
  pointer-events:none;
}
#waitTitle {
  font-size:clamp(28px,6vw,72px);
  font-weight:900; color:#fff;
  text-align:center; line-height:1.3;
  text-shadow:0 0 40px rgba(255,200,80,0.7);
  animation:wtpulse 2s ease-in-out infinite;
}
@keyframes wtpulse { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.04);} }
#waitSub {
  font-size:clamp(16px,3vw,32px);
  color:rgba(255,255,255,0.55); font-weight:700; text-align:center;
}

/* ===== HUD (ゲーム中) ===== */
#hud {
  position:fixed; top:0; left:0; right:0;
  display:none;
  justify-content:space-between; align-items:center;
  padding:16px 28px;
  z-index:700;
}
#hudCount {
  font-size:clamp(24px,5vw,56px);
  font-weight:900; color:#ffd93d;
  text-shadow:0 0 20px rgba(255,217,61,0.8);
}
#hudCountLabel { font-size:0.45em; color:rgba(255,255,255,0.6); display:block; }
#hudTimer {
  font-size:clamp(36px,7vw,80px);
  font-weight:900; color:#fff;
  text-shadow:0 0 24px rgba(255,255,255,0.5);
  min-width:2.2ch; text-align:center;
}
#hudTimer.urgent { color:#ff6b6b; text-shadow:0 0 28px rgba(255,107,107,0.9); animation:urgentpulse 0.4s ease-in-out infinite; }
@keyframes urgentpulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
#hudTop {
  font-size:clamp(14px,2.5vw,28px);
  font-weight:900; color:#6bcb77;
  text-shadow:0 0 16px rgba(107,203,119,0.7);
  text-align:right;
}
#hudTopLabel { font-size:0.5em; color:rgba(255,255,255,0.5); display:block; }

/* タイマーバー */
#timerBar {
  position:fixed; top:0; left:0; height:6px;
  width:100%; z-index:710; display:none;
}
#timerBarInner {
  height:100%;
  background:linear-gradient(90deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
  width:100%;
  transition:width 0.1s linear;
  border-radius:0 3px 3px 0;
}

/* ===== 結果画面 ===== */
#resultScreen {
  position:fixed; inset:0;
  background:rgba(10,10,26,0.95);
  display:none;
  flex-direction:column;
  align-items:center; justify-content:center;
  z-index:900; gap:16px;
  padding:20px;
}
#resultTitle {
  font-size:clamp(28px,5vw,60px);
  font-weight:900; color:#ffd93d;
  text-shadow:0 0 30px rgba(255,217,61,0.8);
  text-align:center;
}
#resultScore {
  font-size:clamp(40px,8vw,100px);
  font-weight:900; color:#fff;
  text-shadow:0 0 40px rgba(255,255,255,0.5);
  line-height:1;
}
#resultScoreLabel { font-size:clamp(14px,2.5vw,24px); color:rgba(255,255,255,0.6); margin-top:-8px; }
#rankingBox {
  background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:18px 28px;
  width:min(480px,90vw);
  max-height:38vh;
  overflow-y:auto;
}
#rankingTitle {
  font-size:clamp(14px,2vw,20px);
  color:rgba(255,255,255,0.7); font-weight:700;
  margin-bottom:12px; text-align:center;
}
.rank-row {
  display:flex; align-items:center; gap:12px;
  padding:8px 4px;
  border-bottom:1px solid rgba(255,255,255,0.08);
  font-size:clamp(14px,2.2vw,22px); font-weight:800;
}
.rank-row:last-child { border-bottom:none; }
.rank-no { min-width:2em; text-align:center; font-size:1.2em; }
.rank-key { flex:1; color:#fff; letter-spacing:0.05em; }
.rank-cnt { color:#ffd93d; min-width:3em; text-align:right; }
.rank-bar-wrap { flex:2; background:rgba(255,255,255,0.1); border-radius:20px; height:10px; overflow:hidden; }
.rank-bar { height:100%; border-radius:20px; background:linear-gradient(90deg,#ff6bcd,#ffd93d); }
.rank-new { font-size:0.7em; background:#ff6b6b; color:#fff; border-radius:4px; padding:1px 5px; margin-left:4px; }

#replayBtn {
  margin-top:8px;
  font-size:clamp(16px,3vw,28px); font-weight:900;
  padding:16px 50px; border-radius:100px; border:none;
  background:linear-gradient(135deg,#ff6bcd,#ffd93d);
  color:#fff; cursor:pointer;
  box-shadow:0 6px 24px rgba(255,107,205,0.5);
  font-family:inherit;
  animation:wtpulse 1.2s ease-in-out infinite;
}

/* ===== canvas & エフェクト ===== */
#canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; }

.key-bubble {
  position:fixed; display:flex; align-items:center; justify-content:center;
  border-radius:50%; font-weight:900; pointer-events:none;
  z-index:200;
  animation:bpop 0.9s cubic-bezier(0.23,1.2,0.42,1) forwards;
  box-shadow:0 0 30px currentColor, inset 0 0 20px rgba(255,255,255,0.3);
  border:4px solid rgba(255,255,255,0.4);
}
@keyframes bpop {
  0%  { transform:translate(-50%,-50%) scale(0); opacity:1; }
  60% { transform:translate(-50%,-50%) scale(1.1) rotate(15deg); opacity:1; }
  100%{ transform:translate(-50%,-50%) scale(1.2) translateY(-70px); opacity:0; }
}

.emoji-burst { position:fixed; font-size:3rem; pointer-events:none; z-index:200; animation:efly 1.1s ease-out forwards; }
@keyframes efly {
  0%  { transform:translate(0,0) scale(0); opacity:1; }
  50% { opacity:1; transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(var(--rot)); }
  100%{ transform:translate(calc(var(--dx)*1.8),calc(var(--dy)*1.8 + 60px)) scale(0.3); opacity:0; }
}

.cursor-dot { position:fixed; width:22px; height:22px; border-radius:50%; pointer-events:none; transform:translate(-50%,-50%); box-shadow:0 0 14px currentColor; z-index:9999; mix-blend-mode:screen; }
.trail { position:fixed; border-radius:50%; pointer-events:none; animation:tfade 0.5s ease-out forwards; mix-blend-mode:screen; }
@keyframes tfade { 0%{transform:translate(-50%,-50%) scale(1);opacity:0.8;} 100%{transform:translate(-50%,-50%) scale(0.1);opacity:0;} }

@keyframes flash-out { 0%{opacity:1;} 100%{opacity:0;} }
@keyframes bubble-pop { 0%{transform:translate(-50%,-50%) scale(0);opacity:1;} 60%{transform:translate(-50%,-50%) scale(1.1);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1.3) translateY(-60px);opacity:0;} }

/* カウントダウン演出 */
#countdown {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(80px,18vw,200px);
  font-weight:900; color:#fff;
  text-shadow:0 0 60px rgba(255,255,255,0.6);
  pointer-events:none; z-index:750;
  opacity:0;
}
.cd-animate { animation:cdpop 0.6s cubic-bezier(0.23,1.4,0.42,1) forwards !important; }
@keyframes cdpop { 0%{transform:translate(-50%,-50%) scale(0.3);opacity:1;} 60%{transform:translate(-50%,-50%) scale(1.1);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1.4);opacity:0;} }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="cursor-dot" id="cursorDot"></div>

<!-- 待機画面 -->
<div id="waitScreen">
  <div id="waitTitle">🎹 あかちゃん<br>あそびば 🎉</div>
  <div id="waitSub">なにかキーをおそう！</div>
</div>

<!-- HUD -->
<div id="timerBar"><div id="timerBarInner"></div></div>
<div id="hud">
  <div id="hudCount"><span id="hudCountLabel">おした回数</span><span id="hudCountNum">0</span></div>
  <div id="hudTimer">20</div>
  <div id="hudTop"><span id="hudTopLabel">1位のキー</span><span id="hudTopKey">-</span></div>
</div>

<!-- カウントダウン -->
<div id="countdown"></div>

<!-- 結果画面 -->
<div id="resultScreen">
  <div id="resultTitle">🎉 けっか はっぴょう！</div>
  <div id="resultScore"><span id="resultScoreNum">0</span></div>
  <div id="resultScoreLabel">かいおした！</div>
  <div id="rankingBox">
    <div id="rankingTitle">🏆 よく おしたキー ランキング</div>
    <div id="rankingList"></div>
  </div>
  <button id="replayBtn" onclick="replay()">▶ もういちど！</button>
</div>

<script>
// ───────────────────────────────
//  定数・状態
// ───────────────────────────────
const GAME_SEC   = 20;
const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bcd','#ff9f43','#00d2d3','#ff6b9d','#a29bfe','#fd79a8','#fdcb6e','#55efc4','#74b9ff','#e17055','#00cec9'];
const EMOJIS = ['⭐','🌟','✨','🎉','🎊','🌈','❤️','💙','💚','💛','🧡','💜','🐱','🐶','🐸','🐼','🦋','🌸','🍎','🍊','🍋','🍉','🎈','🎶','🎵','💫','🌺','🦄','🐳','🦁','🍭','🍦','🎂'];
const BIG    = ['🦄','🐉','🦊','🐬','🦋','🌈','🎡','🎠','🎪','🚀'];
const MEDALS = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];

// ゲーム状態
let phase = 'wait'; // 'wait' | 'play' | 'result'
let resultLocked = false; // 結果画面の入力ロック
let totalCount = 0;
let keyCounts  = {}; // { 'A': 5, 'スペース': 3, ... }
let timerLeft  = GAME_SEC;
let timerInterval = null;
let rafId = null;

// 過去のベスト（セッション内）
let allTimeBest = JSON.parse(sessionStorage.getItem('babyBest') || '{}');

// ───────────────────────────────
//  Canvas & particles
// ───────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });

let particles = [], hue = 0, lastTrail = 0;

class P {
  constructor(x,y,c){ this.x=x;this.y=y;this.c=c;this.vx=(Math.random()-.5)*14;this.vy=(Math.random()-.5)*14-4;this.life=1;this.dec=Math.random()*.02+.015;this.r=Math.random()*12+4;this.sh=Math.floor(Math.random()*3); }
  step(){ this.x+=this.vx;this.y+=this.vy;this.vy+=.32;this.life-=this.dec;this.r*=.97; }
  draw(c){
    c.save();c.globalAlpha=Math.max(this.life,0);c.fillStyle=this.c;c.translate(this.x,this.y);
    if(this.sh===0){c.beginPath();c.arc(0,0,this.r,0,Math.PI*2);c.fill();}
    else if(this.sh===1){c.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;c.lineTo(Math.cos(a)*this.r,Math.sin(a)*this.r);const a2=a+Math.PI/5;c.lineTo(Math.cos(a2)*this.r*.4,Math.sin(a2)*this.r*.4);}c.closePath();c.fill();}
    else{c.fillRect(-this.r/2,-this.r/2,this.r,this.r);}
    c.restore();
  }
}
function spawn(x,y,n=20){ for(let i=0;i<n;i++) particles.push(new P(x,y,COLORS[Math.floor(Math.random()*COLORS.length)])); }

(function loop(){
  ctx.fillStyle='rgba(10,10,26,0.15)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  particles = particles.filter(p=>p.life>0); particles.forEach(p=>{p.step();p.draw(ctx);});
  requestAnimationFrame(loop);
})();

// ───────────────────────────────
//  マウス / クリック
// ───────────────────────────────
const cursorDot = document.getElementById('cursorDot');
document.addEventListener('mousemove', e=>{
  hue=(hue+3)%360;
  const col=`hsl(${hue},100%,60%)`;
  cursorDot.style.background=col; cursorDot.style.left=e.clientX+'px'; cursorDot.style.top=e.clientY+'px';
  const now=Date.now();
  if(now-lastTrail>28){ lastTrail=now;
    const t=document.createElement('div'); t.className='trail';
    const sz=Math.random()*18+8;
    t.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${sz}px;height:${sz}px;background:${col};box-shadow:0 0 8px ${col};`;
    document.body.appendChild(t); setTimeout(()=>t.remove(),500);
    if(Math.random()<.3) spawn(e.clientX,e.clientY,3);
  }
});
document.addEventListener('mousedown', e=>{ if(phase==='play') firework(e.clientX,e.clientY); });
document.addEventListener('contextmenu', e=>e.preventDefault(), true);
document.addEventListener('wheel',      e=>e.preventDefault(), {passive:false});
document.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
document.addEventListener('touchmove',  e=>e.preventDefault(), {passive:false});
document.addEventListener('dragstart',  e=>e.preventDefault(), true);
window.addEventListener('blur', ()=>window.focus());

function firework(x,y){
  spawn(x,y,35);
  const n=Math.floor(Math.random()*4)+3;
  for(let i=0;i<n;i++){
    const el=document.createElement('div'); el.className='emoji-burst';
    el.textContent=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    const ang=(i/n)*Math.PI*2, d=75+Math.random()*55;
    el.style.left=x+'px'; el.style.top=y+'px';
    el.style.setProperty('--dx',Math.cos(ang)*d+'px');
    el.style.setProperty('--dy',Math.sin(ang)*d+'px');
    el.style.setProperty('--rot',(Math.random()*360)+'deg');
    document.body.appendChild(el); setTimeout(()=>el.remove(),1100);
  }
  const fl=document.createElement('div');
  fl.style.cssText=`position:fixed;inset:0;background:radial-gradient(circle at ${x}px ${y}px,rgba(255,255,255,0.13) 0%,transparent 55%);pointer-events:none;animation:flash-out 0.35s ease-out forwards;`;
  document.body.appendChild(fl); setTimeout(()=>fl.remove(),350);
  pulse(COLORS[Math.floor(Math.random()*COLORS.length)]);
  playChord();
}

// ───────────────────────────────
//  キーボード（キャプチャで一本化）
// ───────────────────────────────
document.addEventListener('keyup',   e=>{e.preventDefault();e.stopPropagation();}, true);
document.addEventListener('keypress',e=>{e.preventDefault();e.stopPropagation();}, true);
document.addEventListener('keydown', onKey, true);

function onKey(e){
  e.preventDefault(); e.stopPropagation();

  if(phase==='wait'){
    startGame();
    return;
  }
  if(phase==='result'){
    if(resultLocked) return; // ロック中は無視
    replay();
    return;
  }
  if(phase!=='play') return;

  // キー名を正規化
  let label = e.key.toUpperCase();
  if(label===' ')      label='スペース';
  else if(label==='ENTER') label='エンター';
  else if(label==='BACKSPACE') label='⌫';
  else if(label==='SHIFT')     label='SHIFT';
  else if(label==='CONTROL')   label='CTRL';
  else if(label==='ALT')       label='ALT';
  else if(label==='TAB')       label='TAB';
  else if(label==='ESCAPE')    label='ESC';
  else if(label.length>6)      label='⌨';

  // カウント
  totalCount++;
  keyCounts[label] = (keyCounts[label]||0) + 1;
  updateHUD();

  // エフェクト
  const x=Math.random()*(window.innerWidth-200)+100;
  const y=Math.random()*(window.innerHeight-220)+110;
  const col=COLORS[Math.floor(Math.random()*COLORS.length)];
  const sz=Math.floor(Math.random()*60)+80;

  const b=document.createElement('div'); b.className='key-bubble'; b.textContent=label;
  b.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;font-size:${Math.min(sz*0.38,32)}px;background:${col}33;color:${col};`;
  document.body.appendChild(b); setTimeout(()=>b.remove(),900);
  spawn(x,y,12);

  if(Math.random()<.25){
    const big=document.createElement('div');
    big.style.cssText=`position:fixed;left:${Math.random()*80+10}%;top:${Math.random()*70+10}%;font-size:${Math.random()*60+70}px;pointer-events:none;animation:bubble-pop 1.1s ease-out forwards;`;
    big.textContent=BIG[Math.floor(Math.random()*BIG.length)];
    document.body.appendChild(big); setTimeout(()=>big.remove(),1100);
  }
  pulse(col);
  playKey(e.keyCode);
}

// ───────────────────────────────
//  HUD 更新
// ───────────────────────────────
function updateHUD(){
  document.getElementById('hudCountNum').textContent = totalCount;
  // 1位キー
  const sorted = sortedKeys();
  if(sorted.length>0){
    const top = sorted[0];
    document.getElementById('hudTopKey').textContent = `${top.key} (${top.cnt})`;
  }
}

function sortedKeys(){
  return Object.entries(keyCounts)
    .map(([key,cnt])=>({key,cnt}))
    .sort((a,b)=>b.cnt-a.cnt);
}

// ───────────────────────────────
//  ゲームフロー
// ───────────────────────────────
function startGame(){
  phase='play';
  totalCount=0; keyCounts={}; timerLeft=GAME_SEC;

  document.getElementById('waitScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('timerBar').style.display='block';
  updateHUD();
  document.getElementById('hudTimer').textContent=GAME_SEC;
  document.getElementById('hudTimer').classList.remove('urgent');
  document.getElementById('timerBarInner').style.width='100%';

  // タイマー
  timerInterval = setInterval(()=>{
    timerLeft--;
    document.getElementById('hudTimer').textContent = timerLeft;
    document.getElementById('timerBarInner').style.width = (timerLeft/GAME_SEC*100)+'%';
    if(timerLeft<=5) document.getElementById('hudTimer').classList.add('urgent');
    if(timerLeft<=0){ clearInterval(timerInterval); endGame(); }
  }, 1000);
}

function endGame(){
  phase='result';
  document.getElementById('hud').style.display='none';
  document.getElementById('timerBar').style.display='none';

  // 花火
  for(let i=0;i<10;i++) setTimeout(()=>firework(Math.random()*window.innerWidth,Math.random()*window.innerHeight),i*120);

  // ベスト更新
  allTimeBest.maxCount = Math.max(allTimeBest.maxCount||0, totalCount);
  sessionStorage.setItem('babyBest', JSON.stringify(allTimeBest));

  // 結果表示
  resultLocked = true;
  const replayBtn = document.getElementById('replayBtn');
  replayBtn.disabled = true;
  replayBtn.style.opacity = '0.4';
  replayBtn.style.cursor = 'not-allowed';
  replayBtn.textContent = '⏳ 8びょうまってね…';
  // 8秒カウントダウン表示
  let lockLeft = 8;
  const lockTick = setInterval(()=>{
    lockLeft--;
    if(lockLeft > 0){
      replayBtn.textContent = `⏳ ${lockLeft}びょうまってね…`;
    } else {
      clearInterval(lockTick);
      resultLocked = false;
      replayBtn.disabled = false;
      replayBtn.style.opacity = '1';
      replayBtn.style.cursor = 'pointer';
      replayBtn.style.animation = 'wtpulse 1.2s ease-in-out infinite';
      replayBtn.textContent = '▶ もういちど！';
    }
  }, 1000);
  document.getElementById('resultScoreNum').textContent = totalCount;
  buildRanking();
  document.getElementById('resultScreen').style.display='flex';
}

function buildRanking(){
  const list = sortedKeys().slice(0,10);
  const maxCnt = list[0]?.cnt || 1;
  const html = list.map((item,i)=>{
    const pct = Math.round(item.cnt/maxCnt*100);
    const isNew = (allTimeBest[item.key]||0) < item.cnt;
    if(isNew) allTimeBest[item.key] = item.cnt;
    return `
      <div class="rank-row">
        <span class="rank-no">${MEDALS[i]||i+1}</span>
        <span class="rank-key">${item.key}${isNew?'<span class="rank-new">NEW</span>':''}</span>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%"></div></div>
        <span class="rank-cnt">${item.cnt}回</span>
      </div>`;
  }).join('');
  document.getElementById('rankingList').innerHTML = html || '<div style="color:rgba(255,255,255,.4);text-align:center;padding:12px">キーがおされなかった…</div>';
  sessionStorage.setItem('babyBest', JSON.stringify(allTimeBest));
}

function replay(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('waitScreen').style.display='flex';
  phase='wait';
}

// ───────────────────────────────
//  音
// ───────────────────────────────
let AC;
function getAC(){
  if(!AC){ AC=new(window.AudioContext||window.webkitAudioContext)(); }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function playChord(){
  try{
    const ac=getAC();
    const notes=[261.63,293.66,329.63,349.23,392,440,493.88,523.25];
    const root=notes[Math.floor(Math.random()*notes.length)];
    [1,1.26,1.5].forEach(r=>{
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type=['sine','triangle'][Math.floor(Math.random()*2)];
      o.frequency.setValueAtTime(root*r,ac.currentTime);
      g.gain.setValueAtTime(.16,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.5);
      o.start(ac.currentTime);o.stop(ac.currentTime+.5);
    });
  }catch(e){}
}
function playKey(kc){
  try{
    const ac=getAC();
    const freq=200+(kc%18)*25;
    const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
    f.type='lowpass';f.frequency.value=1800;
    o.connect(f);f.connect(g);g.connect(ac.destination);
    o.type=['square','triangle','sawtooth','sine'][kc%4];
    o.frequency.setValueAtTime(freq,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(freq*1.6,ac.currentTime+.18);
    g.gain.setValueAtTime(.22,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.38);
    o.start(ac.currentTime);o.stop(ac.currentTime+.38);
  }catch(e){}
}

function pulse(col){ document.body.style.background=col+'22'; setTimeout(()=>document.body.style.background='#0a0a1a',280); }
</script>
